<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Received | Aso-Ebi Thread</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body id="confirmation-page">
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">Aso-Ebi Thread</a>
        </div>
    </header>

    <main class="confirmation-container"
        style="max-width: 800px; margin: 4rem auto; padding: 0 5%; text-align: center;">
        <div class="success-icon" style="font-size: 4rem; color: var(--color-primary);">Checkmark Icon</div>
        <h1>Thank You!</h1>
        <p class="intro-text">Your request has been forwarded to our certified network. Vendors will contact you at the
            email provided.</p>

        <section class="submitted-data"
            style="background: white; padding: 2rem; border-radius: 10px; box-shadow: var(--shadow); margin: 2rem 0; text-align: left;">
            <h2 style="border: none; padding: 0; margin-bottom: 1rem;">Submission Summary</h2>
            <ul id="form-data-list" style="list-style: none;">
                <li>
                    <p>Processing your details...</p>
                </li>
            </ul>
        </section>

        <a href="index.html" class="cta-primary">Return to Homepage</a>
    </main>

    <footer style="margin-top: auto;">
        <p>&copy; <span id="currentyear"></span> Aso-Ebi Thread. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const dataList = document.getElementById('form-data-list');
            dataList.innerHTML = '';

            if (Array.from(params).length === 0) {
                dataList.innerHTML = '<li>No data was submitted.</li>';
                return;
            }

            for (const [key, value] of params.entries()) {
                if (key === 'consent') continue; // Hide consent checkbox from summary

                const listItem = document.createElement('li');
                listItem.style.marginBottom = "10px";
                listItem.style.borderBottom = "1px solid #eee";
                listItem.style.paddingBottom = "5px";

                const readableKey = key.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                listItem.innerHTML = `<strong style="color: var(--color-primary);">${readableKey}:</strong> ${decodeURIComponent(value) || 'N/A'}`;
                dataList.appendChild(listItem);
            }

            // Set footer year
            document.getElementById('currentyear').textContent = new Date().getFullYear();
        });
    </script>
</body>

</html>
